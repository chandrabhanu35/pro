version: "3.9"

services:
  clawbot:
    build:
      context: ../..
      dockerfile: agents/clawbot/docker/Dockerfile
    container_name: clawbot-ai
    ports:
      - "5050:5050"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - clawbot-workspace:/app/workspace
      - clawbot-data:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  clawbot-workspace:
    driver: local
  clawbot-data:
    driver: local
